name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: npx wrangler pages deploy ./ --project-name=gemma-chat-web --branch=production --exclude=node_modules --exclude=src --exclude=.github --exclude=.git --exclude=*.toml --exclude=*.json --exclude=*.md --exclude=*.yml --exclude=phone --exclude=cors_proxy.py --exclude=.wranglerignore --exclude=vite.config.js --exclude=README.md --exclude=package-lock.json
